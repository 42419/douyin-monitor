services:
  douyin-monitor:
    build: .
    container_name: douyin-monitor
    restart: unless-stopped
    environment:
      # 代码读配置、写状态/日志统一走这个目录，跟下面的挂载卷保持一致即可，
      # 一般不需要改
      - DOUYIN_MONITOR_HOME=/data
    volumes:
      # .env、users.conf 这些需要你手动编辑的配置，以及 state/、log/、
      # status.json、monitor.pid 这些运行时产生、需要持久化的数据，
      # 全部落在这一个目录里，随宿主机挂载卷持久化，重建/升级容器不会丢
      - ./data:/data
    ports:
      # 只有 .env 里 WEB_ENABLED=true 时这个端口才有意义。
      # 不想开 Web 状态面板的话，把这一段删掉即可
      - "127.0.0.1:8787:8787"
    # 如果要在局域网访问 Web 面板，.env 里把 WEB_HOST 改成 0.0.0.0，
    # 并把上面端口映射的 127.0.0.1: 前缀去掉（注意这样局域网内任何设备都能
    # 访问这个面板，面板本身不做鉴权）
