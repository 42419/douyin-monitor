# =====================================================================
# 抖音多用户视频监控 - Docker Compose 配置
# =====================================================================
#
# 快速开始（三步）：
#   1. 下载配置文件
#      curl -O https://raw.githubusercontent.com/42419/douyin-monitor/main/docker-compose.yml
#      curl -O https://raw.githubusercontent.com/42419/douyin-monitor/main/.env.example
#      curl -O https://raw.githubusercontent.com/42419/douyin-monitor/main/users.conf.example
#      mv .env.example .env && mv users.conf.example users.conf
#
#   2. 编辑 .env（填推送渠道）和 users.conf（填要监控的账号）
#
#   3. docker compose up -d
#
# 常用命令：
#   docker compose logs -f       实时看日志
#   docker compose ps            看容器是否在跑、健康检查状态
#   docker compose restart       改完配置后重启，让配置生效
#   docker compose down          停止并删除容器（数据不会丢）
#   docker pull yunfeiii/douyin-monitor:latest && docker compose up -d
#                                更新到最新版本
#
# =====================================================================

services:
  douyin-monitor:
    image: yunfeiii/douyin-monitor:latest
    container_name: douyin-monitor
    restart: unless-stopped

    # host 网络模式：容器直接共享宿主机网络，.env 里改 WEB_PORT/Web_HOST
    # 就能控制端口和访问范围，不需要改 docker-compose.yml。
    # 注意：仅 Linux 有效，Mac/Windows 需改用 ports 映射。
    network_mode: host

    environment:
      - DOUYIN_MONITOR_HOME=/data

    volumes:
      # 当前目录挂载到容器 /data，.env、users.conf、state/、log/ 全在这里
      - .:/data
